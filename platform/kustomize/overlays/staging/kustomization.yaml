apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: scout-staging

commonLabels:
  environment: staging

images:
  - name: scout/api
    newName: ghcr.io/f0xberry/scout-api
    newTag: staging
  - name: scout/web
    newName: ghcr.io/f0xberry/scout-web
    newTag: staging
  - name: scout/worker
    newName: ghcr.io/f0xberry/scout-worker
    newTag: staging
