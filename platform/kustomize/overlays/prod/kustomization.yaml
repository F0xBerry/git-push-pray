# Production: images pinned by digest (immutable). Update digests after each image build:
#   python3 scripts/pin_prod_digests.py
# Or: TAG=staging python3 scripts/pin_prod_digests.py
#
# Placeholder digests below will not pull; run the script (with crane/docker + registry auth) before prod deploy.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - ../../base

namespace: scout-prod

labels:
  - includeSelectors: true
    pairs:
      environment: prod

images:
  - name: scout/api
    newName: ghcr.io/f0xberry/scout-api
    digest: sha256:1111111111111111111111111111111111111111111111111111111111111111
  - name: scout/web
    newName: ghcr.io/f0xberry/scout-web
    digest: sha256:2222222222222222222222222222222222222222222222222222222222222222
  - name: scout/worker
    newName: ghcr.io/f0xberry/scout-worker
    digest: sha256:3333333333333333333333333333333333333333333333333333333333333333
