apiVersion: apps/v1
kind: Deployment
metadata:
  name: scout-worker
  labels:
    app.kubernetes.io/name: scout-worker
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: scout-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: scout-worker
        app.kubernetes.io/component: worker
    spec:
      containers:
        - name: worker
          image: scout/worker:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_ENV
              value: production
            - name: WORKER_HEARTBEAT_MS
              value: "30000"
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 128Mi
