apiVersion: apps/v1
kind: Deployment
metadata:
  name: scout-web
  labels:
    app.kubernetes.io/name: scout-web
    app.kubernetes.io/component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: scout-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: scout-web
        app.kubernetes.io/component: web
    spec:
      containers:
        - name: web
          image: scout/web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          env:
            - name: API_UPSTREAM
              value: scout-api
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
