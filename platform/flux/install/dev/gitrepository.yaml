# Sync application manifests from GitHub (public repo: no secretRef).
# Private repo: create a Secret with a PAT/SSH key and set spec.secretRef.
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: scout
  namespace: flux-system
spec:
  interval: 1m0s
  url: https://github.com/F0xBerry/git-push-pray
  ref:
    branch: main
