# Reconcile Scout dev workloads from this repo (path = overlay dev).
# Flux creates targetNamespace if missing. Prune removes objects removed from Git.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: scout-dev-apps
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./platform/kustomize/overlays/dev
  prune: true
  sourceRef:
    kind: GitRepository
    name: scout
    namespace: flux-system
  timeout: 5m0s
  targetNamespace: scout-dev
  wait: true
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: scout-api
      namespace: scout-dev
    - apiVersion: apps/v1
      kind: Deployment
      name: scout-web
      namespace: scout-dev
