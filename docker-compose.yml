# Local stack — build from monorepo root
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      PORT: "3001"
      LLM_PROVIDER: ${LLM_PROVIDER:-auto}
      DEMO_MODE: ${DEMO_MODE:-false}
      SKILLS_DIR: /app/skills
      QDRANT_URL: ${QDRANT_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash-lite}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-sonnet-4-20250514}
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:8080}
    volumes:
      - api-data:/app/api/data
      - api-uploads:/app/api/uploads
    restart: unless-stopped

  # Swimlane B — optional vector DB (Qdrant). Start: docker compose --profile vector up -d
  # In .env: QDRANT_URL=http://qdrant:6333
  qdrant:
    image: qdrant/qdrant:v1.12.5
    profiles: ["vector"]
    ports:
      - "${QDRANT_HOST_PORT:-6333}:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "${HOST_PORT:-8080}:80"
    environment:
      API_UPSTREAM: api
    depends_on:
      - api
    restart: unless-stopped

volumes:
  api-data:
  api-uploads:
  qdrant-data:
