name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  swimlane-c-evals:
    name: Swimlane C — eval gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Deterministic eval cases
        run: node evals/runner/run.mjs
      - name: LLM judge stub (optional)
        run: node evals/runner/judge-llm.mjs

  swimlane-b:
    name: Swimlane B — skills guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/verify-swimlane-b-skills.sh

  api:
    name: API — lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/api/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

  web:
    name: Web — build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/web/package-lock.json
      - run: npm ci
      - run: npm run build

  kustomize:
    name: Kustomize — render dev overlay
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: kubectl kustomize
        run: kubectl kustomize platform/kustomize/overlays/dev > /tmp/rendered.yaml && wc -l /tmp/rendered.yaml
